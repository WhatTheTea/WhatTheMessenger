
<main class="flex-center">

        <h1 class="app-title">WhatTheMessenger</h1>

            <app-login style="margin-left: auto; margin-right: auto; text-align: center;" />

            <h3>Hello {{ authService.currentUser() }}</h3>
        }

    </div>
</main>
